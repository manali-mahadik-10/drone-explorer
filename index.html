<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Drone Explorer — Cinema & Panoramic</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#E85D24;--od:#C04828;--og:rgba(232,93,36,0.4);
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#222230;
  --bd:#2a2a3a;--bd2:#3a3a4a;
  --tx:#e8e8f0;--tx2:#9090a0;--tx3:#555566;
  --blue:#3B8BD4;--green:#1D9E75;--red:#E24B4A;--gold:#F9CB42;
  --cy:#00d4ff;--cy2:rgba(0,212,255,0.15);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Exo 2',sans-serif;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* HEADER */
.hdr{background:linear-gradient(90deg,#0d0d15,#141420);border-bottom:1px solid var(--or);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 20px var(--og)}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-logo{width:34px;height:34px;background:var(--or);border-radius:7px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 14px var(--og)}
.hdr-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--tx);letter-spacing:2px;text-transform:uppercase}
.hdr-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--tx3);margin-top:2px;letter-spacing:1px}
.hdr-r{display:flex;align-items:center;gap:12px}
.hud-s{text-align:center;font-family:'Share Tech Mono',monospace}
.hud-v{font-size:15px;color:var(--or);font-weight:600}
.hud-l{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* TABS */
.nav{background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;flex-shrink:0;overflow-x:auto}
.ntab{padding:9px 18px;font-family:'Exo 2',sans-serif;font-size:11px;font-weight:500;color:var(--tx3);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.ntab:hover{color:var(--tx);background:var(--bg3)}
.ntab.active{color:var(--or);border-bottom:2px solid var(--or);background:var(--bg3)}
.ntab.ctab{color:var(--cy)}
.ntab.ctab.active{color:var(--cy);border-bottom:2px solid var(--cy);background:var(--bg3)}
.nbadge{font-size:8px;padding:1px 5px;border-radius:6px;margin-left:5px;vertical-align:middle;font-weight:500}
.nbadge.or{background:var(--or);color:#fff}
.nbadge.cy{background:var(--cy);color:#000}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden;min-height:0}

/* DRONE CANVAS */
.dc{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden;background:radial-gradient(ellipse at 30% 30%,#0d1428,#080810 60%,#050508)}
.grid-bg{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(232,93,36,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(232,93,36,.04) 1px,transparent 1px);background-size:50px 50px}
.cdec{position:absolute;width:36px;height:36px;pointer-events:none}
.cdec.tl{top:8px;left:8px;border-top:1px solid var(--or);border-left:1px solid var(--or);opacity:.3}
.cdec.tr{top:8px;right:8px;border-top:1px solid var(--or);border-right:1px solid var(--or);opacity:.3}
.cdec.bl{bottom:56px;left:8px;border-bottom:1px solid var(--or);border-left:1px solid var(--or);opacity:.3}
.cdec.br{bottom:56px;right:8px;border-bottom:1px solid var(--or);border-right:1px solid var(--or);opacity:.3}
.fzone{flex:1;position:relative;overflow:hidden;cursor:crosshair}
.dwrap{position:absolute;cursor:grab;user-select:none;filter:drop-shadow(0 6px 18px rgba(232,93,36,.4));transition:filter .15s}
.dwrap:active{cursor:grabbing}
@keyframes compGlow{0%,100%{filter:drop-shadow(0 0 6px #E85D24) drop-shadow(0 0 14px #E85D24) brightness(1.7)}50%{filter:drop-shadow(0 0 10px #ff8844) drop-shadow(0 0 22px #ff8844) brightness(2)}}
.comp-glowing{animation:compGlow 1.4s ease-in-out infinite}
.alt-wrap{position:absolute;right:12px;top:12px;display:flex;flex-direction:column;align-items:center;gap:3px}
.alt-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--tx3);letter-spacing:1px}
.alt-bar{width:5px;height:100px;background:rgba(255,255,255,.05);border:.5px solid var(--bd);border-radius:3px;overflow:hidden;position:relative}
.alt-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,var(--or),#ffaa44);border-radius:3px;transition:height .25s}
.alt-val{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--or)}
.compass-svg{position:absolute;left:12px;top:12px}
.xhair{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:.1}
.kbh{position:absolute;bottom:62px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--tx3);background:rgba(0,0,0,.6);padding:3px 9px;border-radius:4px;border:.5px solid var(--bd);pointer-events:none;opacity:0;transition:opacity .5s;white-space:nowrap}
.kbh.show{opacity:1}
.cbar{background:var(--bg2);border-top:1px solid var(--bd);padding:7px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
.clbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px}
.dpad{display:grid;grid-template-columns:28px 28px 28px;grid-template-rows:28px 28px 28px;gap:2px}
.du{grid-column:2;grid-row:1}.dl{grid-column:1;grid-row:2}.dr{grid-column:3;grid-row:2}.dd{grid-column:2;grid-row:3}
.btn{width:28px;height:28px;border:1px solid var(--bd2);border-radius:5px;background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--tx2);transition:all .12s}
.btn:hover{background:var(--bg4);border-color:var(--or);color:var(--or);box-shadow:0 0 7px var(--og)}
.btn:active{transform:scale(.9)}
.btn-w{width:auto;padding:0 10px;font-size:10px;font-weight:500;letter-spacing:.5px}
.btn-or{background:var(--od);border-color:var(--or);color:#fff}
.btn-or:hover{background:var(--or)}
.pos-hud{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--tx3);margin-left:auto}

/* INFO PANEL */
.info{width:260px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.info-hd{padding:10px 13px;background:var(--bg3);border-bottom:1px solid var(--bd);flex-shrink:0}
.info-dn{font-family:'Orbitron',monospace;font-size:10px;font-weight:600;color:var(--or);letter-spacing:1px;text-transform:uppercase}
.info-ds{font-size:9px;color:var(--tx3);margin-top:2px}
.clist{flex:1;overflow-y:auto;padding:7px 9px}
.clist::-webkit-scrollbar{width:3px}
.clist::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.ccard{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:7px 9px;margin-bottom:4px;cursor:pointer;transition:all .15s}
.ccard:hover{border-color:var(--or);background:#1f1a15}
.ccard.sel{border-color:var(--or);background:#1f1a15;box-shadow:inset 3px 0 0 var(--or)}
.cn{font-size:11px;font-weight:500;color:var(--tx)}
.cs{font-size:9px;color:var(--tx3);margin-top:2px}
.tbox{background:#08080f;border-top:1px solid var(--bd);padding:10px 12px;flex-shrink:0;max-height:230px;overflow-y:auto}
.tbox::-webkit-scrollbar{width:3px}
.tbox::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.tbadge{display:inline-block;font-size:8px;padding:2px 7px;border-radius:7px;background:var(--or);color:#fff;font-family:'Share Tech Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.tname{font-size:11px;font-weight:600;color:var(--or);margin-bottom:5px}
.ttext{font-size:10px;color:var(--tx2);line-height:1.75}
.nosel{font-size:10px;color:var(--tx3);line-height:1.7;padding:4px 0}
@keyframes spin-cw{to{transform:rotate(360deg)}}
@keyframes spin-ccw{to{transform:rotate(-360deg)}}
@keyframes pulse-o{0%,100%{opacity:.3}50%{opacity:.6}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.prop-cw{animation:spin-cw .13s linear infinite;transform-origin:center}
.prop-ccw{animation:spin-ccw .13s linear infinite;transform-origin:center}
.glow-p{animation:pulse-o 1.8s ease-in-out infinite}
.fade-in{animation:fadeIn .3s ease}

/* ===================== CINEMA MODE ===================== */
.cinema-layout{display:flex;flex:1;overflow:hidden;min-height:0;flex-direction:column}
.cinema-top{display:flex;flex:1;overflow:hidden;min-height:0}

/* The live scene canvas area */
.scene-viewport{flex:1;position:relative;overflow:hidden;background:#000}
canvas#sceneCanvas{display:block;width:100%;height:100%}

/* HUD overlays ON the canvas */
.cam-hud{position:absolute;inset:0;pointer-events:none}
/* Letterbox */
.lbx-top{position:absolute;top:0;left:0;right:0;height:38px;background:#000;z-index:10}
.lbx-bot{position:absolute;bottom:0;left:0;right:0;height:38px;background:#000;z-index:10}
/* Grid lines (rule of thirds) */
.grid-line{position:absolute;background:rgba(255,255,255,.07);z-index:11}
.gl-v1{top:38px;bottom:38px;left:33.33%;width:.5px}
.gl-v2{top:38px;bottom:38px;left:66.66%;width:.5px}
.gl-h1{left:0;right:0;top:calc(38px + 33.33% * .74);height:.5px}
.gl-h2{left:0;right:0;top:calc(38px + 66.66% * .74);height:.5px}
/* Corner brackets */
.cb{position:absolute;width:20px;height:20px;z-index:12}
.cb.tl{top:46px;left:10px;border-top:2px solid rgba(0,212,255,.7);border-left:2px solid rgba(0,212,255,.7)}
.cb.tr{top:46px;right:10px;border-top:2px solid rgba(0,212,255,.7);border-right:2px solid rgba(0,212,255,.7)}
.cb.bl{bottom:46px;left:10px;border-bottom:2px solid rgba(0,212,255,.7);border-left:2px solid rgba(0,212,255,.7)}
.cb.br{bottom:46px;right:10px;border-bottom:2px solid rgba(0,212,255,.7);border-right:2px solid rgba(0,212,255,.7)}
/* REC dot */
.rec{position:absolute;top:10px;left:14px;display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:10px;color:#fff;z-index:13}
.rec-c{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red);animation:blink .7s ease-in-out infinite}
/* Time code */
.timecode{position:absolute;top:10px;right:14px;font-family:'Share Tech Mono',monospace;font-size:10px;color:#fff;z-index:13}
/* Scene label bottom-left inside frame */
.scene-label{position:absolute;bottom:46px;left:14px;z-index:13}
.scene-label .sl-badge{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--cy);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}
.scene-label .sl-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:#fff;letter-spacing:1px;text-shadow:0 2px 12px rgba(0,0,0,.8)}
.scene-label .sl-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px;max-width:360px;line-height:1.5;text-shadow:0 1px 6px rgba(0,0,0,.9)}
/* Focus peaking dots (decorative) */
.fp{position:absolute;border:1px solid rgba(255,80,0,.6);border-radius:2px;z-index:12}
/* Histogram strip */
.hist-wrap{position:absolute;bottom:46px;right:14px;z-index:13;opacity:.8}

/* SCENE STRIP at bottom */
.scene-strip{display:flex;background:var(--bg2);border-top:1px solid var(--bd);padding:8px 10px;gap:7px;flex-shrink:0;overflow-x:auto}
.scene-strip::-webkit-scrollbar{height:3px}
.scene-strip::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.scard{flex-shrink:0;width:120px;border-radius:7px;overflow:hidden;border:1.5px solid var(--bd);cursor:pointer;transition:all .2s;background:var(--bg3)}
.scard:hover{border-color:var(--cy);transform:translateY(-2px)}
.scard.active{border-color:var(--cy);box-shadow:0 0 10px rgba(0,212,255,.25)}
.sc-canvas-wrap{height:60px;overflow:hidden;position:relative}
.sc-canvas-wrap canvas{width:100%;height:100%;display:block}
.sc-info{padding:5px 7px}
.sc-title{font-size:10px;font-weight:500;color:var(--tx);font-family:'Exo 2',sans-serif}
.sc-tag{font-size:8px;color:var(--tx3);font-family:'Share Tech Mono',monospace;margin-top:2px}

/* RIGHT PANEL for cinema */
.cpanel{width:260px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.cp-head{padding:10px 12px;background:var(--bg3);border-bottom:1px solid var(--bd);flex-shrink:0}
.cp-hn{font-family:'Orbitron',monospace;font-size:10px;font-weight:600;color:var(--cy);letter-spacing:1px;text-transform:uppercase}
.cp-hs{font-size:9px;color:var(--tx3);margin-top:2px}
.cp-body{flex:1;overflow-y:auto;padding:10px 11px}
.cp-body::-webkit-scrollbar{width:3px}
.cp-body::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid var(--bd)}
.srow:last-child{border-bottom:none}
.slbl{font-size:9px;color:var(--tx3);font-family:'Share Tech Mono',monospace;letter-spacing:.5px}
.sval{font-size:10px;color:var(--cy);font-weight:500;font-family:'Share Tech Mono',monospace}
.tip-box{background:var(--bg3);border:1px solid var(--bd);border-left:2px solid var(--cy);border-radius:6px;padding:9px 10px;margin-top:9px}
.tip-lbl{font-size:8px;color:var(--cy);font-family:'Share Tech Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.tip-text{font-size:10px;color:var(--tx2);line-height:1.7}
.pano-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px}
.pseg{background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:7px 8px;text-align:center}
.pnum{font-size:15px;font-weight:600;color:var(--cy);font-family:'Orbitron',monospace}
.plbl{font-size:8px;color:var(--tx3);font-family:'Share Tech Mono',monospace;margin-top:2px;letter-spacing:.5px}
.nav-btns{display:flex;gap:5px;margin-top:9px}
.nav-btn{flex:1;padding:7px;border:1px solid;border-radius:5px;background:transparent;cursor:pointer;font-size:10px;font-family:'Exo 2',sans-serif;font-weight:500;letter-spacing:.5px;text-transform:uppercase;transition:all .15s}
.nav-btn.cy{border-color:var(--cy);color:var(--cy)}
.nav-btn.cy:hover{background:rgba(0,212,255,.1)}
.nav-btn.or{border-color:var(--or);color:var(--or)}
.nav-btn.or:hover{background:rgba(232,93,36,.1)}
</style>
</head>
<body>
<div id="app">

<div class="hdr">
  <div class="hdr-l">
    <div class="hdr-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
    </div>
    <div>
      <div class="hdr-title">Drone Explorer</div>
      <div class="hdr-sub">BONKA 5200mAh · Carbon X-Frame · Interactive Study</div>
    </div>
  </div>
  <div class="hdr-r">
    <div class="hud-s"><div class="hud-v" id="hudAlt">50m</div><div class="hud-l">Altitude</div></div>
    <div class="hud-s"><div class="hud-v" id="hudRot">0°</div><div class="hud-l">Heading</div></div>
    <div class="hud-s"><div class="hud-v" id="hudSpd">0</div><div class="hud-l">km/h</div></div>
    <div class="dot"></div>
  </div>
</div>

<div class="nav" id="navBar"></div>
<div class="main" id="mainContent"></div>
</div>

<script>
/* ── DATA ── */
const drones={
  mydrone:{name:'MY DRONE',sub:'BONKA 5200mAh · Carbon X-Quad',components:{
    frame:{label:'Carbon Fiber X-Frame',short:'Main structural chassis',badge:'Structure',theory:'Your drone uses a carbon fiber X-frame. Carbon fiber offers an exceptional strength-to-weight ratio, roughly 5× stronger than steel at ¼ the weight. The X configuration places all 4 motors equidistant from center, providing symmetric thrust response. Frame stiffness is critical — any flex causes vibration that corrupts IMU sensor data.'},
    arms:{label:'Carbon Fiber Arms',short:'4 tubular motor arms',badge:'Structure',theory:'The 4 arms are carbon fiber tubes providing rigidity while keeping weight minimal. Arm length determines the wheelbase. A longer wheelbase increases stability and allows larger propellers but reduces agility. Your arms have orange/red CNC aluminum motor mount collars at the ends.'},
    motor_fl:{label:'Motor — Front Left (CCW)',short:'Brushless BLDC motor',badge:'Propulsion',theory:'Front-left motor spins Counter-Clockwise (CCW). Brushless DC motors work via 3-phase electromagnetic induction. The ESC rapidly switches current through 3 stator coils, rotating permanent magnets on the bell housing. For a 5200mAh build with large props, motors are likely 300–500 KV for efficient heavy-lift flight.'},
    motor_fr:{label:'Motor — Front Right (CW)',short:'Brushless BLDC motor',badge:'Propulsion',theory:'Front-right spins Clockwise (CW). In an X-quad, diagonal pairs share rotation: FL+RR=CCW, FR+RL=CW. This cancels gyroscopic torque so the airframe does not spin during hover. Swapping any 2 of 3 motor wires reverses spin direction.'},
    motor_rl:{label:'Motor — Rear Left (CW)',short:'Brushless BLDC motor',badge:'Propulsion',theory:'Rear-left spins CW, paired diagonally with front-right. Motor placement at arm tips maximizes the moment arm — the further from center, the more leverage each motor has for pitch and roll. Outrunner bell housings are ideal for direct-drive propeller systems.'},
    motor_rr:{label:'Motor — Rear Right (CCW)',short:'Brushless BLDC motor',badge:'Propulsion',theory:'Rear-right spins CCW. Each motor is independently controlled by a dedicated ESC via DSHOT digital protocol at up to 8,000 times per second, allowing near-instantaneous attitude correction.'},
    prop_fl:{label:'Propeller — Front Left',short:'Large black carbon prop (CCW)',badge:'Aerodynamics',theory:'Likely 10–13 inch diameter black carbon fiber props. Larger diameter propellers move more air per revolution generating thrust at lower RPM — efficient for payload-carrying. CCW pitch means the leading edge sweeps counterclockwise when viewed from above.'},
    prop_fr:{label:'Propeller — Front Right',short:'Large black carbon prop (CW)',badge:'Aerodynamics',theory:'CW pitched propeller — mirror image of the CCW prop. Using matched pairs is essential. Your large props suggest a photography or payload-lifting quad. The black finish reduces sun glare that can affect optical sensors below.'},
    prop_rl:{label:'Propeller — Rear Left',short:'Large black carbon prop (CW)',badge:'Aerodynamics',theory:'CW rotation. Prop balance is critical — even 0.1g imbalance causes vibration at thousands of RPM blurring footage. Self-tightening props use motor rotation direction to tighten against the shaft — preventing mid-flight prop loss.'},
    prop_rr:{label:'Propeller — Rear Right',short:'Large black carbon prop (CCW)',badge:'Aerodynamics',theory:'CCW rotation. Total disc area of all 4 props determines maximum lifting capacity. Your large-diameter props create substantial disc area for significant payload carrying. Large slow-spinning props stay well within safe tip speeds while generating impressive thrust.'},
    battery:{label:'BONKA 5200mAh 35C LiPo',short:'6S 22.2V Lithium Polymer',badge:'Power',theory:'BONKA 5200mAh 35C LiPo — 6S pack (6 cells = 22.2V nominal, 25.2V full). The 35C rating means 182 Amps continuous — nearly 4,040 Watts peak power. Ideal for heavy-lift. Expected flight time: 10–20 min. The XT60/XT90 connector handles high-current discharge safely.'},
    fc:{label:'Flight Controller',short:'Attitude & navigation brain',badge:'Electronics',theory:'The FC reads IMU data at up to 32,000 Hz and sends corrective motor commands. The PID control loop (Proportional-Integral-Derivative) calculates attitude error and adjusts motor speeds to correct it within microseconds. Options include Pixhawk, Cube Orange, and ArduPilot boards.'},
    esc:{label:'ESC × 4',short:'Electronic Speed Controllers',badge:'Electronics',theory:'Each motor driven by a dedicated ESC that converts FC digital commands into 3-phase AC power. For a 6S battery, ESCs must handle 25.2V and 40–80A per motor. Modern ESCs use BLHeli_32 or AM32 firmware with RPM filtering and bidirectional DSHOT telemetry.'},
    redwiring:{label:'Power Distribution & Wiring',short:'High-current red cables',badge:'Power',theory:'Thick red wiring is the high-current power distribution system. For 6S drawing 100+ amps, wire gauge must be at least 10AWG. The PDB splits battery power to all 4 ESCs. Capacitors on the PDB smooth voltage spikes protecting ESC MOSFETs during rapid throttle changes.'}
  }},
  quadcopter:{name:'STANDARD QUAD',sub:'Generic 4-rotor multirotor',components:{
    body:{label:'Frame / Body',short:'Central chassis',badge:'Structure',theory:'The frame is the structural backbone of a quadcopter, typically carbon fiber or plastic. The X configuration places all 4 motors equidistant from center for symmetric thrust response. Frame stiffness is critical — any flex causes vibration that corrupts IMU sensor data.'},
    motor1:{label:'Motor FL/RR (CCW)',short:'Counter-clockwise brushless',badge:'Propulsion',theory:'Brushless DC motors work via electromagnetic induction. Motor KV rating (RPM per volt) determines speed vs torque. Front-left and rear-right motors spin CCW to balance torque.'},
    motor2:{label:'Motor FR/RL (CW)',short:'Clockwise brushless',badge:'Propulsion',theory:'Front-right and rear-left spin CW. This cancels yaw forces during hover. Yaw control is achieved by speeding up one diagonal pair and slowing the other, creating net rotational moment.'},

function renderTabs(){

  h+=`<button class="ntab ctab ${mode==='cinema'?'active':''}" onclick="switchMode('cinema')">CINEMA &amp; PANORAMIC <span class="nbadge cy">LIVE</span></button>`;

function switchDrone(k){curDrone=k;mode='drone';selComp=null;stopCinema();renderTabs();renderMain();}
function switchMode(m){mode=m;selComp=null;renderTabs();renderMain();}

function renderMain(){
  const mc=document.getElementById('mainContent');
  if(mode==='cinema'){mc.innerHTML=buildCinemaHTML();initCinema();}
  else{mc.innerHTML=buildDroneHTML();bindDrone();}
}

function bindDrone(){
  renderDroneSVG();
  let drag=false,dsx=0,dsy=0,odx=0,ody=0;
  const dw=document.getElementById('dwrap');
  if(!dw)return;
  dw.addEventListener('mousedown',e=>{drag=true;dsx=e.clientX;dsy=e.clientY;odx=dx;ody=dy;e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(!drag)return;const z=document.getElementById('fzone');if(!z)return;dx=Math.max(-(z.clientWidth/2-120),Math.min(z.clientWidth/2-120,odx+(e.clientX-dsx)));dy=Math.max(-(z.clientHeight/2-120),Math.min(z.clientHeight/2-120,ody+(e.clientY-dsy)));applyT();});
  document.addEventListener('mouseup',()=>drag=false);
  setTimeout(()=>applyT(),60);
}
function renderDroneSVG(){
  const svg=document.getElementById('dsvg');if(!svg)return;
  svg.innerHTML=getSVG(curDrone);
  if(selComp)svg.querySelectorAll(`.chit[data-c="${selComp}"]`).forEach(el=>el.classList.add('comp-glowing'));
  svg.querySelectorAll('.chit').forEach(el=>{
    el.addEventListener('click',e=>{const c=el.dataset.c;if(c){selComp=c;renderDroneSVG();showComp(c);}e.stopPropagation();});
    el.addEventListener('mouseenter',()=>{if(selComp!==el.dataset.c)el.style.filter='brightness(1.5) drop-shadow(0 0 5px #E85D24)';});
    el.addEventListener('mouseleave',()=>{if(selComp!==el.dataset.c)el.style.filter='';});
  });
  renderCompList();
}
function renderCompList(){
  const d=drones[curDrone],cl=document.getElementById('clist');if(!cl)return;
  cl.innerHTML=Object.entries(d.components).map(([k,c])=>`<div class="ccard ${selComp===k?'sel':''} fade-in" onclick="selComp='${k}';renderDroneSVG();showComp('${k}')"><div class="cn">${c.label}</div><div class="cs">${c.short}</div></div>`).join('');
}
function showComp(k){const d=drones[curDrone];if(!d.components[k])return;const c=d.components[k],tb=document.getElementById('tbox');if(!tb)return;tb.innerHTML=`<div class="tbadge fade-in">${c.badge}</div><div class="tname fade-in">${c.label}</div><div class="ttext fade-in">${c.theory}</div>`;}
function applyT(){const z=document.getElementById('fzone'),w=document.getElementById('dwrap');if(!z||!w)return;const s=0.5+(dalt/100)*0.9;w.style.left=((z.clientWidth-240)/2+dx)+'px';w.style.top=((z.clientHeight-240)/2+dy)+'px';w.style.transform=`rotate(${dr}deg) scale(${s})`;const ph=document.getElementById('posH');if(ph)ph.textContent=`X:${Math.round(dx)} Y:${Math.round(dy)} HDG:${Math.round(dr)}°`;}
function mv(ddx,ddy){const z=document.getElementById('fzone');if(!z)return;dx=Math.max(-(z.clientWidth/2-120),Math.min(z.clientWidth/2-120,dx+ddx));dy=Math.max(-(z.clientHeight/2-120),Math.min(z.clientHeight/2-120,dy+ddy));applyT();document.getElementById('hudSpd').textContent=Math.round(Math.sqrt(ddx*ddx+ddy*ddy)*2);setTimeout(()=>{const s=document.getElementById('hudSpd');if(s)s.textContent='0';},400);}
function rot(da){dr=(dr+da+360)%360;const n=document.getElementById('cmpN');if(n)n.setAttribute('transform',`rotate(${dr},25,25)`);document.getElementById('hudRot').textContent=Math.round(dr)+'°';applyT();}
function chAlt(da){dalt=Math.max(0,Math.min(100,dalt+da));const af=document.getElementById('altF'),av=document.getElementById('altV');if(af)af.style.height=dalt+'%';if(av)av.textContent=dalt+'m';document.getElementById('hudAlt').textContent=dalt+'m';applyT();}
function resetAll(){dx=0;dy=0;dr=0;dalt=50;selComp=null;const af=document.getElementById('altF'),av=document.getElementById('altV'),n=document.getElementById('cmpN');if(af)af.style.height='50%';if(av)av.textContent='50m';if(n)n.removeAttribute('transform');document.getElementById('hudAlt').textContent='50m';document.getElementById('hudRot').textContent='0°';renderDroneSVG();applyT();}
function toggleProps(){propsOn=!propsOn;const pb=document.getElementById('pBtn');if(pb)pb.textContent=propsOn?'⏸ Props':'▶ Props';renderDroneSVG();if(selComp)showComp(selComp);}

/* ══════════════════════════════════════════
   CINEMA MODE — LIVE CANVAS PAINTERS
══════════════════════════════════════════ */
let cinemaT=0;

/* Each painter(ctx,w,h,t) draws the animated scene */
const painters={
  aerial:(ctx,w,h,t)=>{
    // Sky gradient
    const sky=ctx.createLinearGradient(0,0,0,h*.65);
    sky.addColorStop(0,'#0a0a1a');sky.addColorStop(.4,'#1a2a4a');sky.addColorStop(1,'#e8841a');
    ctx.fillStyle=sky;ctx.fillRect(0,0,w,h*.65);
    // Sun
    const sx=w*.72,sy=h*.28;
    ctx.save();ctx.globalAlpha=.9;
    const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,80);
    sg.addColorStop(0,'#fff7cc');sg.addColorStop(.3,'#ffcc44');sg.addColorStop(1,'rgba(255,120,0,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sx,sy,80,0,Math.PI*2);ctx.fill();ctx.restore();
    // Lens flare streak
    ctx.save();ctx.globalAlpha=.15;ctx.strokeStyle='#fff7cc';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,sy+10);ctx.lineTo(w,sy-10);ctx.stroke();ctx.restore();
    // Clouds
    [[w*.1,h*.18,120,22],[w*.4,h*.12,90,18],[w*.65,h*.2,110,20],[w*.85,h*.15,80,15]].forEach(([cx2,cy2,rw,rh])=>{
      ctx.save();ctx.globalAlpha=.18;ctx.fillStyle='#c8d8ff';
      ctx.beginPath();ctx.ellipse(cx2+Math.sin(t*.3+cx2)*.5,cy2,rw,rh,0,0,Math.PI*2);ctx.fill();ctx.restore();
    });
    // Ground
    const grd=ctx.createLinearGradient(0,h*.65,0,h);
    grd.addColorStop(0,'#2a4a1a');grd.addColorStop(.3,'#1e3a12');grd.addColorStop(1,'#0d1a08');
    ctx.fillStyle=grd;ctx.fillRect(0,h*.65,w,h*.35);
    // Grid roads on ground
    ctx.save();ctx.globalAlpha=.25;ctx.strokeStyle='#88aa44';ctx.lineWidth=1;
    for(let i=0;i<6;i++){ctx.beginPath();ctx.moveTo(w*i/5,h*.65);ctx.lineTo(w*(i/5+.5*(1-h*.65/h)),h);ctx.stroke();}
    for(let j=0;j<4;j++){const gy=h*.65+j*(h*.35/3);ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(w,gy);ctx.stroke();}
    ctx.restore();
    // Animated drone silhouette flying across
    const droneX=(t*30)%( w+120)-60,droneY=h*.3+Math.sin(t*.5)*12;
    drawDroneSilhouette(ctx,droneX,droneY,0.6);
    // Camera path arc
    ctx.save();ctx.globalAlpha=.18;ctx.strokeStyle='#00d4ff';ctx.lineWidth=1.5;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(0,h*.28);ctx.quadraticCurveTo(w*.5,h*.1,w,h*.28);ctx.stroke();ctx.restore();
  },

  pano:(ctx,w,h,t)=>{
    // Deep blue sky
    const sky=ctx.createLinearGradient(0,0,0,h*.55);
    sky.addColorStop(0,'#020510');sky.addColorStop(.5,'#0a1a3a');sky.addColorStop(1,'#1a3a6a');
    ctx.fillStyle=sky;ctx.fillRect(0,0,w,h*.55);
    // Stars
    ctx.save();
    for(let i=0;i<60;i++){const sx2=((i*137+t*5)%w),sy2=((i*97)%(h*.5)),br=.3+.7*Math.abs(Math.sin(t+i));ctx.globalAlpha=br*.7;ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(sx2,sy2,i%3===0?1.5:.8,0,Math.PI*2);ctx.fill();}
    ctx.restore();
    // Horizon glow
    ctx.save();ctx.globalAlpha=.4;const hg=ctx.createLinearGradient(0,h*.48,0,h*.62);hg.addColorStop(0,'rgba(0,200,180,0)');hg.addColorStop(.5,'rgba(0,220,200,0.3)');hg.addColorStop(1,'rgba(0,200,180,0)');ctx.fillStyle=hg;ctx.fillRect(0,h*.48,w,h*.14);ctx.restore();
    // Ground (panoramic ground view)
    const gr2=ctx.createLinearGradient(0,h*.55,0,h);gr2.addColorStop(0,'#0a1a2a');gr2.addColorStop(1,'#050d14');ctx.fillStyle=gr2;ctx.fillRect(0,h*.55,w,h*.45);
    // Panoramic sweep lines (showing 360 sweep)
    const cx3=w*.5,cy3=h*.55;
    for(let ang=0;ang<360;ang+=15){const rad=(ang+t*8)*Math.PI/180,len=80+20*Math.sin(t+ang*.1);ctx.save();ctx.globalAlpha=.07+.04*Math.sin(t+ang*.05);ctx.strokeStyle='#00d4ff';ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(cx3,cy3);ctx.lineTo(cx3+Math.cos(rad)*len,cy3+Math.sin(rad)*len*.35);ctx.stroke();ctx.restore();}
    // 360 circle indicator
    ctx.save();ctx.globalAlpha=.3;ctx.strokeStyle='#00d4ff';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.ellipse(cx3,cy3,120,42,0,0,Math.PI*2);ctx.stroke();
    const prog=(t*15)%360;ctx.globalAlpha=.9;ctx.strokeStyle='#00ffcc';ctx.lineWidth=2;ctx.setLineDash([]);ctx.beginPath();ctx.ellipse(cx3,cy3,120,42,0,-Math.PI/2,-Math.PI/2+prog*Math.PI/180);ctx.stroke();
    ctx.restore();
    // City skyline silhouette
    ctx.save();ctx.fillStyle='#0d1a2a';
    [[w*.05,h*.45,18,60],[w*.1,h*.38,22,80],[w*.18,h*.42,16,55],[w*.28,h*.35,25,95],[w*.38,h*.40,20,65],[w*.52,h*.32,30,110],[w*.62,h*.38,22,75],[w*.72,h*.42,16,55],[w*.82,h*.36,26,88],[w*.9,h*.40,18,65],[w*.95,h*.44,14,50]].forEach(([bx,by,bw2,bh2])=>{ctx.fillRect(bx-bw2/2,by,bw2,bh2);});
    ctx.restore();
    // Drone top view hovering
    const pdroneX=w*.5+Math.sin(t*.2)*8,pdroneY=h*.22+Math.cos(t*.15)*5;
    drawDroneSilhouette(ctx,pdroneX,pdroneY,0.9);
    // Photo flash frames
    if(Math.floor(t*1.5)%3===0){ctx.save();ctx.globalAlpha=.06;ctx.fillStyle='#ffffff';ctx.fillRect(0,0,w,h);ctx.restore();}
  },

  realestate:(ctx,w,h,t)=>{
    // Warm morning sky
    const sky=ctx.createLinearGradient(0,0,0,h*.5);sky.addColorStop(0,'#0d1520');sky.addColorStop(.5,'#2a4a6a');sky.addColorStop(1,'#d4845a');ctx.fillStyle=sky;ctx.fillRect(0,0,w,h*.5);
    // Sun glow
    ctx.save();ctx.globalAlpha=.7;const sg=ctx.createRadialGradient(w*.15,h*.25,0,w*.15,h*.25,120);sg.addColorStop(0,'#fff0cc');sg.addColorStop(.4,'rgba(255,180,80,0.4)');sg.addColorStop(1,'transparent');ctx.fillStyle=sg;ctx.fillRect(0,0,w,h*.5);ctx.restore();
    // Ground
    const gr=ctx.createLinearGradient(0,h*.5,0,h);gr.addColorStop(0,'#1a3a10');gr.addColorStop(.5,'#143008');gr.addColorStop(1,'#0a1a05');ctx.fillStyle=gr;ctx.fillRect(0,h*.5,w,h*.5);
    // House (top-down isometric view)
    const hx=w*.5,hy=h*.52;
    ctx.save();
    // Roof (top-down)
    ctx.fillStyle='#8b3a3a';ctx.beginPath();ctx.moveTo(hx,hy-30);ctx.lineTo(hx+80,hy);ctx.lineTo(hx+80,hy+70);ctx.lineTo(hx,hy+100);ctx.lineTo(hx-80,hy+70);ctx.lineTo(hx-80,hy);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#5a2020';ctx.lineWidth=2;ctx.stroke();
    // Roof ridge
    ctx.strokeStyle='#6a2a2a';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(hx-60,hy+10);ctx.lineTo(hx+60,hy+10);ctx.stroke();
    // Pool
    ctx.fillStyle='#1a6a8a';ctx.beginPath();ctx.ellipse(hx+100,hy+80,30,20,0.3,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,212,255,0.6)';ctx.lineWidth=1;ctx.stroke();
    // Garden paths
    ctx.strokeStyle='#c8a870';ctx.lineWidth=4;ctx.setLineDash([8,4]);ctx.beginPath();ctx.moveTo(hx,hy+100);ctx.lineTo(hx,hy+160);ctx.stroke();ctx.setLineDash([]);
    ctx.restore();
    // Trees
    [[hx-120,hy+20],[hx+160,hy+30],[hx-110,hy+100],[hx+140,hy+100]].forEach(([tx2,ty2])=>{ctx.save();ctx.fillStyle='#1a5a10';ctx.beginPath();ctx.arc(tx2,ty2,14+Math.sin(t+tx2)*.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#0d3a08';ctx.beginPath();ctx.arc(tx2,ty2,8,0,Math.PI*2);ctx.fill();ctx.restore();});
    // Orbit path
    ctx.save();ctx.globalAlpha=.3;ctx.strokeStyle='#00d4ff';ctx.lineWidth=1.5;ctx.setLineDash([5,5]);ctx.beginPath();ctx.ellipse(hx,hy+30,200,70,0,0,Math.PI*2);ctx.stroke();ctx.restore();
    // Drone on orbit
    const oa=t*.6,odx2=hx+Math.cos(oa)*200,ody2=hy+30+Math.sin(oa)*70;
    drawDroneSilhouette(ctx,odx2,ody2,0.55);
  },

  fpv:(ctx,w,h,t)=>{
    // Dark FPV motion blur tunnel
    ctx.fillStyle='#050508';ctx.fillRect(0,0,w,h);
    // Speed lines (motion blur)
    const cx4=w*.5,cy4=h*.5;
    for(let i=0;i<40;i++){const ang=i*(Math.PI*2/40)+(t*.5),spd=80+((i*73)%120),x1=cx4+Math.cos(ang)*20,y1=cy4+Math.sin(ang)*20,x2=cx4+Math.cos(ang)*(spd+Math.sin(t*3+i)*.15*spd+spd),y2=cy4+Math.sin(ang)*(spd+Math.sin(t*3+i)*.15*spd+spd);
      ctx.save();ctx.globalAlpha=.15+.1*Math.sin(t*2+i);ctx.strokeStyle=`hsl(${200+i*3},80%,60%)`;ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore();}
    // Center focus zone
    ctx.save();ctx.globalAlpha=.08;const cg=ctx.createRadialGradient(cx4,cy4,0,cx4,cy4,120);cg.addColorStop(0,'#ff8800');cg.addColorStop(1,'transparent');ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx4,cy4,120,0,Math.PI*2);ctx.fill();ctx.restore();
    // Ground rush at bottom
    const gr3=ctx.createLinearGradient(0,h*.7,0,h);gr3.addColorStop(0,'#0a0a0a');gr3.addColorStop(1,'#1a1008');ctx.fillStyle=gr3;ctx.fillRect(0,h*.7,w,h*.3);
    // Ground grid rushing
    ctx.save();ctx.globalAlpha=.3;ctx.strokeStyle='#ff6600';ctx.lineWidth=.8;
    for(let gx=0;gx<8;gx++){const gxp=gx*(w/7);ctx.beginPath();ctx.moveTo(gxp,h*.7);ctx.lineTo(cx4+(gxp-cx4)*.1,h*.9);ctx.stroke();}
    for(let gy2=0;gy2<4;gy2++){const gyp=h*.72+gy2*(h*.1-(t*20)%( h*.1));ctx.beginPath();ctx.moveTo(0,gyp);ctx.lineTo(w,gyp);ctx.stroke();}
    ctx.restore();
    // FPV OSD elements
    ctx.save();ctx.globalAlpha=.7;ctx.fillStyle='#ff4400';
    // Artificial horizon
    const tilt=Math.sin(t*.8)*25;ctx.save();ctx.translate(cx4,cy4-20);ctx.rotate(tilt*Math.PI/180);ctx.globalAlpha=.6;ctx.strokeStyle='#ff8800';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-60,0);ctx.lineTo(-20,0);ctx.moveTo(20,0);ctx.lineTo(60,0);ctx.stroke();ctx.restore();
    // Throttle bar
    ctx.fillStyle='rgba(255,100,0,0.6)';ctx.fillRect(w*.04,h*.2,8,(h*.6)*(.5+Math.sin(t*.5)*.3));
    ctx.strokeStyle='#ff6600';ctx.lineWidth=1;ctx.strokeRect(w*.04,h*.2,8,h*.6);
    ctx.restore();
  },

  tracking:(ctx,w,h,t)=>{
    // Race track top-down
    ctx.fillStyle='#0a1a0a';ctx.fillRect(0,0,w,h);
    // Track asphalt
    ctx.save();ctx.strokeStyle='#2a2a2a';ctx.lineWidth=60;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(w*.15,h*.2);ctx.lineTo(w*.85,h*.2);ctx.lineTo(w*.85,h*.8);ctx.lineTo(w*.15,h*.8);ctx.closePath();ctx.stroke();ctx.restore();
    // Track lines
    ctx.save();ctx.strokeStyle='#555';ctx.lineWidth=58;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(w*.15,h*.2);ctx.lineTo(w*.85,h*.2);ctx.lineTo(w*.85,h*.8);ctx.lineTo(w*.15,h*.8);ctx.closePath();ctx.stroke();ctx.restore();
    // White dashes
    ctx.save();ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=2;ctx.setLineDash([20,15]);
    ctx.beginPath();ctx.moveTo(w*.15,h*.2);ctx.lineTo(w*.85,h*.2);ctx.lineTo(w*.85,h*.8);ctx.lineTo(w*.15,h*.8);ctx.closePath();ctx.stroke();ctx.setLineDash([]);ctx.restore();
    // Subject car (moving around track)
    const perimeter=2*((w*.7)+(h*.6)),pos=(t*60)%perimeter;
    let carX,carY,carA;
    const trackW=w*.7,trackH=h*.6,startX=w*.15,startY=h*.2;
    if(pos<trackW){carX=startX+pos;carY=startY;carA=0;}
    else if(pos<trackW+trackH){carX=startX+trackW;carY=startY+(pos-trackW);carA=Math.PI/2;}
    else if(pos<2*trackW+trackH){carX=startX+trackW-(pos-trackW-trackH);carY=startY+trackH;carA=Math.PI;}
    else{carX=startX;carY=startY+trackH-(pos-2*trackW-trackH);carA=-Math.PI/2;}
    // Draw car
    ctx.save();ctx.translate(carX,carY);ctx.rotate(carA);
    ctx.fillStyle='#E85D24';ctx.beginPath();ctx.roundRect(-12,-7,24,14,3);ctx.fill();
    ctx.fillStyle='#cc4400';ctx.beginPath();ctx.roundRect(-8,-5,16,10,2);ctx.fill();
    ctx.restore();
    // Tracking box
    ctx.save();ctx.strokeStyle='#00d4ff';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.strokeRect(carX-22,carY-18,44,36);
    ctx.setLineDash([]);ctx.fillStyle='#00d4ff';ctx.font='8px Share Tech Mono,monospace';ctx.fillText('LOCK',carX-10,carY-22);ctx.restore();
    // Drone above car (follows)
    const doff=15;drawDroneSilhouette(ctx,carX+doff,carY-30,0.5);
    // Lead line
    ctx.save();ctx.globalAlpha=.3;ctx.strokeStyle='#00d4ff';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(carX,carY);ctx.lineTo(carX+doff,carY-30);ctx.stroke();ctx.restore();
  },

  hyperlapse:(ctx,w,h,t)=>{
    // Timelapse sky — sweeping clouds fast
    const sky=ctx.createLinearGradient(0,0,0,h*.55);
    const hour=(t*10)%24;const br=hour<6||hour>20?.1:hour<10||hour>18?.5:1;
    const nightC='#020308',dayC='#0a1428',sunsetC='#2a1a0a';
    sky.addColorStop(0,hour<6||hour>20?nightC:hour<10||hour>18?sunsetC:dayC);
    sky.addColorStop(1,hour<6||hour>20?'#050a14':hour<10||hour>18?'#d45a1a':'#1a3a6a');
    ctx.fillStyle=sky;ctx.fillRect(0,0,w,h*.55);
    // Stars (night)
    if(hour<6||hour>20){ctx.save();for(let i=0;i<50;i++){ctx.globalAlpha=.6*Math.abs(Math.sin(t*.5+i));ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(i*w/50,i%2===0?h*.1:h*.3,i%4===0?1.5:.7,0,Math.PI*2);ctx.fill();}ctx.restore();}
    // Fast-moving clouds
    for(let c=0;c<5;c++){const cx5=(t*40*( c+1)*.6+c*w/4)%( w+200)-100,cy5=h*(0.1+c*.08);ctx.save();ctx.globalAlpha=br*.2;ctx.fillStyle='#c8d8ff';ctx.beginPath();ctx.ellipse(cx5,cy5,70+c*20,15+c*5,0,0,Math.PI*2);ctx.fill();ctx.restore();}
    // Ground — city
    ctx.fillStyle=hour<6||hour>20?'#050a06':'#0d1a0e';ctx.fillRect(0,h*.55,w,h*.45);
    // City lights (timelapse)
    ctx.save();
    for(let b=0;b<18;b++){const bx2=b*(w/17),bh2=h*.08+b%4*h*.06,by2=h*.55-bh2;
      ctx.fillStyle=`hsl(${220+b*5},30%,${8+br*10}%)`;ctx.fillRect(bx2-8,by2,16,bh2);
      if(hour<8||hour>17){ctx.globalAlpha=.5+.5*Math.sin(t+b);ctx.fillStyle='#ffe08a';
      for(let wy=0;wy<4;wy++)for(let wx=0;wx<2;wx++){if((b*7+wy*3+wx)%3!==0)ctx.fillRect(bx2-5+wx*7,by2+8+wy*10,4,5);}ctx.globalAlpha=1;}}
    ctx.restore();
    // Waypoint path line
    ctx.save();ctx.globalAlpha=.4;ctx.strokeStyle='#00d4ff';ctx.lineWidth=1.5;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(0,h*.25);ctx.bezierCurveTo(w*.3,h*.15,w*.6,h*.35,w,h*.2);ctx.stroke();ctx.restore();
    // Drone moving along path
    const px=( t*20)%w,py=h*.25+(Math.sin(px/w*Math.PI)*h*.1);
    drawDroneSilhouette(ctx,px,py,0.55);
    // Time display
    const hh=Math.floor(hour).toString().padStart(2,'0'),mm=Math.floor((hour%1)*60).toString().padStart(2,'0');
    ctx.save();ctx.globalAlpha=.7;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(w*.75,h*.57,80,22);ctx.fillStyle='#ffe08a';ctx.font='bold 12px Share Tech Mono,monospace';ctx.fillText(`${hh}:${mm}`,w*.77,h*.572);ctx.restore();
  }
};

function drawDroneSilhouette(ctx,x,y,scale){
  ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);
  const arms=[[-18,-18],[18,-18],[-18,18],[18,18]];
  ctx.strokeStyle='#888';ctx.lineWidth=2.5;ctx.lineCap='round';
  arms.forEach(([ax,ay])=>{ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(ax,ay);ctx.stroke();});
  ctx.fillStyle='#555';arms.forEach(([ax,ay])=>{ctx.beginPath();ctx.arc(ax,ay,5,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='#333';ctx.beginPath();ctx.roundRect(-8,-8,16,16,3);ctx.fill();
  ctx.fillStyle='#E85D24';ctx.beginPath();ctx.arc(-18,-18,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1D9E75';ctx.beginPath();ctx.arc(18,18,3,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function buildCinemaHTML(){
  const sc=scenes[curScene];
  const thumbs=scenes.map((s,i)=>`
    <div class="scard ${i===curScene?'active':''}" onclick="switchScene(${i})">
      <div class="sc-canvas-wrap"><canvas id="thumb_${i}" width="120" height="60"></canvas></div>
      <div class="sc-info"><div class="sc-title">${s.title}</div><div class="sc-tag">${s.badge} · ${s.tag}</div></div>
    </div>`).join('');

  const specsHTML=Object.entries(sc.specs).map(([k,v])=>`<div class="srow"><span class="slbl">${k}</span><span class="sval">${v}</span></div>`).join('');
  const panoExtra=sc.id==='pano'?`<div class="pano-grid">
    <div class="pseg"><div class="pnum">36</div><div class="plbl">SHOTS</div></div>
    <div class="pseg"><div class="pnum">360°</div><div class="plbl">COVERAGE</div></div>
    <div class="pseg"><div class="pnum">100MP</div><div class="plbl">OUTPUT</div></div>
    <div class="pseg"><div class="pnum">30%</div><div class="plbl">OVERLAP</div></div>
  </div>`:'';

  return `
  <div class="cinema-layout">
    <div class="cinema-top">
      <div class="scene-viewport">
        <canvas id="sceneCanvas"></canvas>
        <div class="cam-hud">
          <div class="lbx-top"></div>
          <div class="lbx-bot"></div>
          <div class="grid-line gl-v1"></div>
          <div class="grid-line gl-v2"></div>
          <div class="grid-line gl-h1"></div>
          <div class="grid-line gl-h2"></div>
          <div class="cb tl"></div><div class="cb tr"></div><div class="cb bl"></div><div class="cb br"></div>
          <div class="rec"><div class="rec-c"></div><span>REC 4K</span></div>
          <div class="timecode" id="tcDisplay">00:00:00:00</div>
          <div class="scene-label">
            <div class="sl-badge">${sc.badge} · ${sc.altitude}</div>
            <div class="sl-title">${sc.title}</div>
            <div class="sl-sub">${sc.tip}</div>
          </div>
        </div>
      </div>
      <div class="cpanel">
        <div class="cp-head"><div class="cp-hn">${sc.title}</div><div class="cp-hs">Flight & Camera Specs</div></div>
        <div class="cp-body">
          <div class="srow"><span class="slbl">Altitude</span><span class="sval">${sc.altitude}</span></div>
          <div class="srow"><span class="slbl">Speed</span><span class="sval">${sc.speed}</span></div>
          <div class="srow"><span class="slbl">FOV</span><span class="sval">${sc.fov}</span></div>
          <div class="srow"><span class="slbl">Overlap</span><span class="sval">${sc.overlap}</span></div>
          <div class="srow"><span class="slbl">Camera</span><span class="sval" style="font-size:9px">${sc.camera}</span></div>
          <div class="srow"><span class="slbl">Gimbal</span><span class="sval" style="font-size:9px">${sc.gimbal}</span></div>
          ${specsHTML}
          ${panoExtra}
          <div class="tip-box"><div class="tip-lbl">Pro Tip</div><div class="tip-text">${sc.tip}</div></div>
          <div class="nav-btns">
            <button class="nav-btn cy" onclick="switchScene(${(curScene-1+scenes.length)%scenes.length})">← Prev</button>
            <button class="nav-btn or" onclick="switchScene(${(curScene+1)%scenes.length})">Next →</button>
          </div>
        </div>
      </div>
    </div>
    <div class="scene-strip">${thumbs}</div>
  </div>`;
}

function switchScene(i){curScene=i;stopCinema();renderTabs();renderMain();}

function stopCinema(){
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  if(tcInterval){clearInterval(tcInterval);tcInterval=null;}
}

function initCinema(){
  const mainCanvas=document.getElementById('sceneCanvas');
  if(!mainCanvas)return;
  const vp=mainCanvas.parentElement;

  function resizeMain(){mainCanvas.width=vp.clientWidth;mainCanvas.height=vp.clientHeight;}
  resizeMain();
  window.addEventListener('resize',resizeMain);

  const sceneId=scenes[curScene].id;
  const painter=painters[sceneId];

  // Timecode
  let tcStart=Date.now();
  tcInterval=setInterval(()=>{
    const el=document.getElementById('tcDisplay');if(!el)return;
    const d=Math.floor((Date.now()-tcStart)/1000);
    const h=Math.floor(d/3600),m=Math.floor((d%3600)/60),s=d%60,fr=Math.floor((Date.now()%1000)/41.67);
    el.textContent=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}:${fr.toString().padStart(2,'0')}`;
  },41);

  // Main animation loop
  function loop(ts){
    cinemaT=ts/1000;
    const ctx=mainCanvas.getContext('2d');
    ctx.clearRect(0,0,mainCanvas.width,mainCanvas.height);
    if(painter)painter(ctx,mainCanvas.width,mainCanvas.height,cinemaT);
    animFrame=requestAnimationFrame(loop);
    // Paint thumbnails
    scenes.forEach((s,i)=>{
      const tc=document.getElementById(`thumb_${i}`);
      if(!tc)return;
      const tctx=tc.getContext('2d');
      tctx.clearRect(0,0,120,60);
      if(painters[s.id])painters[s.id](tctx,120,60,cinemaT);
    });
  }
  animFrame=requestAnimationFrame(loop);
}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(mode!=='drone')return;
  if(!kbShown){const h=document.getElementById('kbh');if(h){h.classList.add('show');kbShown=true;setTimeout(()=>{h.classList.remove('show');kbShown=false;},3000);}}
  if(e.key==='ArrowUp'){mv(0,-26);e.preventDefault();}
  if(e.key==='ArrowDown'){mv(0,26);e.preventDefault();}
  if(e.key==='ArrowLeft'){mv(-26,0);e.preventDefault();}
  if(e.key==='ArrowRight'){mv(26,0);e.preventDefault();}
  if(e.key==='w'||e.key==='W')chAlt(10);
  if(e.key==='s'||e.key==='S')chAlt(-10);
  if(e.key==='q'||e.key==='Q')rot(-18);
  if(e.key==='e'||e.key==='E')rot(18);
  if(e.key==='r'||e.key==='R')resetAll();
  if(e.key==='p'||e.key==='P')toggleProps();
});

/* ── INIT ── */
renderTabs();
renderMain();
</script>
